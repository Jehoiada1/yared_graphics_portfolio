    <script>
      (function () {
        try {
          var themeKey = "theme";
          var preferenceKey = "themePreferenceSet";
          var hasPreference = localStorage.getItem(preferenceKey) === "true";
          var storedTheme = localStorage.getItem(themeKey);
          var theme = hasPreference && (storedTheme === "dark" || storedTheme === "light")
            ? storedTheme
            : "dark";

          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (error) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <!-- Structured Data: Portfolio JSON-LD -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

    </script>
