<?xml version="1.0" encoding="utf-8"?>
<!-- SVG favicon that masks the profile PNG into a circle -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="240" />
    </clipPath>
    <style>
      /* fallback background */
      .bg { fill: #6C63FF; }
    </style>
  </defs>

  <!-- Background circle (visible if image has transparency) -->
  <circle class="bg" cx="256" cy="256" r="256" />

  <!-- Embedded profile image masked to a circle -->
  <image href="/yared-profile.png" x="32" y="32" width="448" height="448" clip-path="url(#circle-clip)" preserveAspectRatio="xMidYMid slice" />

  <!-- Optional subtle ring for separation -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="16" />
</svg>